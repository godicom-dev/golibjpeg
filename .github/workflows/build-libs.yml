name: build-libs

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - ".github/workflows/build-libs.yml"
      - ".github/actions/build-native/**"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            embed-name: golibjpeg_amd64.dll
          - name: linux-amd64
            os: ubuntu-24.04
            embed-name: golibjpeg_linux_amd64.so
          - name: linux-arm64
            os: ubuntu-24.04-arm
            embed-name: golibjpeg_linux_arm64.so
          - name: darwin-arm64
            os: macos-latest
            embed-name: golibjpeg_darwin_arm64.dylib

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build native library
        uses: ./.github/actions/build-native
        with:
          embed-name: ${{ matrix.embed-name }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.embed-name }}
          path: native/libs/${{ matrix.embed-name }}

  commit:
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - name: Update native/libs
        run: |
          mkdir -p native/libs
          cp artifacts/* native/libs/
          ls -la native/libs/

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update prebuilt native libraries"
          file_pattern: native/libs/*
