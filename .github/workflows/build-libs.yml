name: build-libs

on:
  push:
    branches: [main]
    paths: ["_csrc/**"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            cmake-arch: x64
            cmake-generator: Visual Studio 17 2022
            embed-name: golibjpeg_amd64.dll
          - name: linux-amd64
            os: ubuntu-24.04
            cmake-arch: ""
            cmake-generator: ""
            embed-name: golibjpeg_linux_amd64.so
          - name: linux-arm64
            os: ubuntu-24.04-arm
            cmake-arch: ""
            cmake-generator: ""
            embed-name: golibjpeg_linux_arm64.so
          - name: darwin-amd64
            os: macos-13
            cmake-arch: x86_64
            cmake-generator: ""
            embed-name: golibjpeg_darwin_amd64.dylib
          - name: darwin-arm64
            os: macos-14
            cmake-arch: arm64
            cmake-generator: ""
            embed-name: golibjpeg_darwin_arm64.dylib

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Windows - CMake configure + build
        if: runner.os == 'Windows'
        run: |
          cmake -S _csrc -B _csrc/build${{ matrix.cmake-arch }} -G "${{ matrix.cmake-generator }}" -A ${{ matrix.cmake-arch }}
          cmake --build _csrc/build${{ matrix.cmake-arch }} --config Release

      - name: Windows - copy
        if: runner.os == 'Windows'
        run: |
          mkdir -p native/libs
          cp _csrc/build${{ matrix.cmake-arch }}/Release/golibjpeg.dll native/libs/${{ matrix.embed-name }}

      - name: Unix - CMake configure + build
        if: runner.os != 'Windows'
        run: |
          cmake -S _csrc -B _csrc/build_nix \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build _csrc/build_nix --config Release

      - name: Unix - copy (linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p native/libs
          cp _csrc/build_nix/libgolibjpeg.so native/libs/${{ matrix.embed-name }}

      - name: Unix - copy (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p native/libs
          cp _csrc/build_nix/libgolibjpeg.dylib native/libs/${{ matrix.embed-name }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.embed-name }}
          path: native/libs/${{ matrix.embed-name }}

  commit:
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - run: |
          mkdir -p native/libs
          cp artifacts/* native/libs/

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update prebuilt native libraries"
          file_pattern: native/libs/*
