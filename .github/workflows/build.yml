name: build

on:
  push:
    branches: [main]
    paths-ignore: ["lib/**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            os: windows-latest
            embed-name: golibjpeg_amd64.dll
            go-arch: amd64
          - name: linux-amd64
            os: ubuntu-24.04
            embed-name: golibjpeg_linux_amd64.so
            go-arch: amd64
          - name: linux-arm64
            os: ubuntu-24.04-arm
            embed-name: golibjpeg_linux_arm64.so
            go-arch: arm64
          - name: darwin-arm64
            os: macos-latest
            embed-name: golibjpeg_darwin_arm64.dylib
            go-arch: arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build native library
        uses: ./.github/actions/build-native
        with:
          embed-name: ${{ matrix.embed-name }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Go test
        run: go test -v ./...

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.embed-name }}
          path: native/libs/${{ matrix.embed-name }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          makeLatest: true
